services:
  - type: web
    name: vetri-ai-interview-coach
    env: python
    buildCommand: |
      python -m venv venv
      source venv/bin/activate
      pip install -r backend/requirements.txt
    startCommand: |
      cd backend && gunicorn wsgi:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.9.0
    plan: free